<!DOCTYPE html>
<html lang="en">
<head>{% include head.html %}</head>
<body>
  {% include header.html %}
  <main>
    <div class="post-header">
      <div class="container">
        <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags %} &mdash; {{ page.tags | join: ", " }}{% endif %}</p>
        <h1>{{ page.title }}</h1>
      </div>
    </div>
    <div class="post-content">
      <div class="container">
        <a href="{{ '/blog/' | relative_url }}" class="back-link">&larr; All posts</a>
        {{ content }}
      </div>
    </div>
  </main>
  {% include footer.html %}
</body>
</html>
